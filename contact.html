<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>

    <link rel="stylesheet" href="css/contact.css">
</head>
<body>

    <h1>¡Trabajemos Juntos!</h1>
    <br><br>

    <form id="form-contact">
        <label for="from_name">Nombre:</label><br>
        <input type="text" id="from_name" name="from_name" required><br><br>

        <label for="reply_to">Correo Electrónico:</label><br>
        <input type="email" id="reply_to" name="reply_to" required><br><br>

        <label for="message">Mensaje:</label><br>
        <textarea id="message" name="message" rows="5" required></textarea><br><br>

        <button type="submit">Enviar</button>
    </form>

    <a href="index.html" class="back-btn">Volver</a>
    

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="js/email.js"></script>
    
</body>
</html>
